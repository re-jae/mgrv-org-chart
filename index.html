<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGRV — Protected Document</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: #0f0f0f;
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
#auth-screen {
  width: 100%;
  max-width: 360px;
  padding: 0 24px;
}
.eyebrow {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 16px;
}
.title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 13px;
  font-weight: 400;
  color: #999;
  margin-bottom: 32px;
}
.input-wrap {
  margin-bottom: 12px;
}
input[type="password"] {
  width: 100%;
  height: 48px;
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 6px;
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  padding: 0 16px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="password"]:focus {
  border-color: #555;
}
input[type="password"]::placeholder {
  color: #555;
}
button {
  width: 100%;
  height: 48px;
  background: #fff;
  color: #0f0f0f;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #eee; }
button:active { background: #ddd; }
button:disabled {
  background: #555;
  color: #999;
  cursor: not-allowed;
}
.error {
  font-size: 12px;
  color: #ff4444;
  margin-top: 12px;
  text-align: center;
  min-height: 18px;
}
.footer-note {
  font-size: 11px;
  color: #444;
  text-align: center;
  margin-top: 40px;
}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="eyebrow">MGRV CONFIDENTIAL</div>
  <div class="title">문서 열람</div>
  <div class="subtitle">이 문서는 비밀번호로 보호되어 있습니다.</div>
  <form id="auth-form" autocomplete="off">
    <div class="input-wrap">
      <input type="password" id="pw" placeholder="비밀번호 입력" autofocus>
    </div>
    <button type="submit" id="btn">확인</button>
    <div class="error" id="err"></div>
  </form>
  <div class="footer-note">AES-256 암호화로 보호된 문서입니다.</div>
</div>

<script>
(function() {
  const form = document.getElementById('auth-form');
  const input = document.getElementById('pw');
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function unlock(password) {
    const payload = JSON.parse(
      document.getElementById('encrypted-payload').textContent
    );
    const salt = b64ToBytes(payload.salt);
    const iv = b64ToBytes(payload.iv);
    const ciphertext = b64ToBytes(payload.ciphertext);

    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ciphertext
    );
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  }

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const password = input.value;
    if (!password) return;

    btn.disabled = true;
    btn.textContent = '복호화 중...';
    err.textContent = '';

    try {
      await unlock(password);
    } catch (ex) {
      err.textContent = '비밀번호가 올바르지 않습니다.';
      btn.disabled = false;
      btn.textContent = '확인';
      input.value = '';
      input.focus();
    }
  });
})();
</script>
</body>
</html>
